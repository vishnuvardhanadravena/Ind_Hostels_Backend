     delete:
      summary: Delete a property
      description: Removes a property by its ID.
      tags:
        - Vendor-Properties
      security:
        - BearerAuth: []
      operationId: deletePost
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the property to delete.
          schema:
            type: string
      responses:
        "200":
          description: Property deleted successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Property deleted successfully"
        "401":
          description: ID not received.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Id not received"
        "404":
          description: Property not found.
          content:
