  # Vendor Properties 
  /indhostels/auth/vendor/createproperty:
    post:
      tags:
        - Vendor-Properties
      security:
        - BearerAuth: []
      summary: Create a new accommodation
      description: Creates a new accommodation with images and details
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - property_name
                - property_description
                - property_type
                - category_name
                - city
                - area
                - address
                - amenities
                - room_types
                - cacellation_policy
                - host_contact
                - host_name
                - isverified
                - isbestfor 
                - nearby
              properties:
                property_name:
                  type: string
                  example: string
                property_description:
                  type: string
                  example: string
                property_type:
                  type: string
                  example: string
                category_name:
                  type: string
                  example: string
                city:
                  type: string
                  example: string
                area:
                  type: string
                  example: string
                address:
                  type: string
                  example: string
                locationurl:
                  type: string
                  example: string
                lat:
                  type: number
                lont:
                  type: number
                amenities:
                  type: array 
                  items: 
                    type: string
                    example: string
                room_types:
                  type: array 
                  items: 
                    type: string
                    example: lightweight
                check_in_time:
                  type: string
                  example: string
                check_out_time:
                  type: string
                  example: string
                cacellation_policy:
                  type: string
                  example: string
                host_contact:
                  type: string
                  example: string
                host_name:
                  type: string
                  example: string
                images:
                  type: array 
                  items:
                    type: file
                  description: Array of accommodation images 
                isbestfor:
                  type: string
                  example: string 
                nearby:
                  type: array 
                  items: 
                    type: string
                    example: string 
                tax:
                   type: boolean
                   example: true
                tax_amount:
                   type: number
                   example: 10
                isverified:
                   type: boolean
                   example: true 
      responses:
        '200':
          description: Accommodation created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Accommodation created successfully
                  data:
                    type: object
                    description: Created accommodation object
        '400':
          description: Bad Request - Missing or invalid input
        '500':
          description: Internal Server Error
  
