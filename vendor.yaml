                  data:
                    type: object
                    description: Created accommodation object
        '400':
          description: Bad Request - Missing or invalid input
        '500':
          description: Internal Server Error

  /indhostels/auth/vendor/property/replaceproductimage/{id}:
     patch:
      tags:
        - Vendor-Properties 
      security:
        - BearerAuth: [] 
      summary: Replace a single image in a property
      description: Replace a single image in the property at a given index
      parameters:
        - name: id
          in: path
          required: true
          description: The property ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - indexes
                - images
              properties:
                indexes:
                  type: string
                  example: "[0,1]"
                  description: The index of the image to replace (send as array, e.g. "[0]" or "[0,1]")
                images:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Array of new property images
      responses:
        '200':
          description: Image replaced successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Property image replaced successfully
                  data:
                    type: object
                    description: Updated property object
        '400':
          description: Bad Request - Missing or invalid input
        '500':
          description: Internal Server Error
     
  /indhostels/auth/vendor/updateproperty/{id}:
    patch:
      summary: Update a property
      description: Updates property details. Only fields provided in the request body will be updated.
      tags:
        - Vendor-Properties
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The ID of the property to update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                property_name:
                  type: string
                  example: Homely Haven
                property_description:
                  type: string
                  example: Experience comfort and community living at UrbanNest PG — fully furnished rooms, high-speed WiFi, home-cooked meals, and 24/7 security. Perfect for students and working professionals seeking convenience and style
                property_type:
                  type: string
                  example: pgs
                category_name:
                  type: string 
                  example: menspg
                city:
                  type: string
                  example: hyderabad
                area:
                  type: string 
                  example: kphb
                address:
                  type: string
                  example: KPHB Colony ,Phase2,Near Metro Station
                locationurl:
                  type: string
                  example: string
                amenities:
                  type: array
                  items:
                    type: string
                  example: 
                      - wifi
                      - Verified
                      - Free WiFi
                      - Meals included
                      - 24/7 Security
                      - Comfortable Beds
                      - Laundry Service
                      - Parking
                room_types:
                  type: array
                  items:
                    type: string
                  example: 
                      - one share
                      - two share
                      - three share
                      - four share
                      - five share
                check_in_time:
                  type: string
                  example: from 6:00 am
                check_out_time:
                  type: string
                  example: to 11:00 pm
                cancellation_policy:
                  type: string
                  example: no cancellation
                host_contact:
                  type: string
                  example: 4569873216
                host_name:
                  type: string
                  example: string
                tax:
                  type: boolean
                  example: true
                tax_amount:
                  type: number
                  example: 10
                isverified:
                  type: boolean
                  example: true
      responses:
        '200':
          description: Property updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                
        '400':
          description: Invalid ID or bad request
        '404':
          description: Property not found
        '500':
          description: Internal server error
  
