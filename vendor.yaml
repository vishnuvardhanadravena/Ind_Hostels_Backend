  /indhostels/auth/vendor/property/images/{id}:
    post:
      tags:
        - Vendor-Properties 
      security:
        - BearerAuth: []
      summary: Add new images to a property
      description: Upload one or more images to an existing property
      parameters:
        - name: id
          in: path
          required: true
          description: The property ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - images
              properties:
                images:
                  type: array
                  items:
                    type: file
                    format: binary
                  description: One or more property images
      responses:
        '200':
          description: Images added successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  statuscode:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: Images added successfully
        '400':
          description: Bad Request - Invalid ID, missing property, or empty files
        '500':
          description: Internal Server Error 

  /indhostels/auth/vendor/property/singleimage/{id}:
