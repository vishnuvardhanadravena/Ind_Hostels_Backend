openapi: "3.1.0"

servers:
  - url: http://192.168.1.47:3000
    description: Local Server
  - url: http://localhost:3000
    description: Local Server
  - url: https://api.indhostel.com
    description: Production Server
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      
security:
  - BearerAuth: []

info:
  title: Indhostels website Api
  description: API for Indhostels website
  contact:
    name: support team
    url: http://indhostels.com/contactUs
    email: mukeshpabolu@techpixe.com  


paths:
 # Vendor Profile calls
  /indhostels/auth/vendor/vendorregister:
    post:
      summary: Vendor Register
      description: Vendor Register Using Their Details 
      tags:
        - Vendor-Profile 
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - full_name
                - email
                - phone
                - city 
                - state
                - address
                - password
                - bankdetails
              properties:
                full_name:
                  type: string
                  example: "Mukesh"
                email:
                  type: string
                  example: "mukeshpabolu@techpixe.com"
                phone:
                  type: number
                  example: "8374831031"
                city:
                  type: string
                  example: "Mumbai"
                state:
                  type: string
                  example: "Maharashtra"
                address:
                  type: string
                  example: "123 Main Street" 
                password:
                  type: string
                  example: "Test@123" 
                bankdetails:
                  type: string
                  example: '[{"account_holder_name":"Mahesh","account_number":"0110040500000013","ifsc_code":"SBIN0000051","bank_name":"SBI Bank"}]'
                  description: |
                    Pass JSON array as a string.
                    Example:
                    [
                      {
                        "account_holder_name": "Mahesh",
                        "account_number": "0110040500000013",
                        "ifsc_code": "SBIN0000051",
                        "bank_name": "SBI Bank"
                      }
                    ]
                docs:
                  type: array 
                  items:
                    type: file
                  description: Array of accommodation images 
                  
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: login successfully
                  JWTtoken:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '401':
          description: Authentication failed due to missing/invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: incorrect phone number or password does not match
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Internal Server Error
                  error:
                    type: string
  
  
  
