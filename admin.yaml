openapi: "3.1.0"

tags:
  - name: Admin
    description: operations related to admin 
  - name: Admin - Users
    description: operations related to admin users
  - name: Admin - Accommodations
    description: operations related to admin accommodations
  - name: Admin - Rooms
    description: operations related to admin rooms
  - name: Category 
    description: operations related to products 
  - name: Admin-coupon
    description: operations related to admin coupon
  - name: Admin-ContactUs
    description: operations related to admin contact us 
  

servers:
  - url: http://192.168.1.47:3000
    description: Local Server
  - url: http://localhost:3000
    description: Local Server
  - url: https://api.indhostel.com
    description: Production Server
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      
security:
  - BearerAuth: []

info:
  title: Indhostels website Api
  description: API for Indhostels website
  contact:
    name: support team
    url: http://indhostels.com/contactUs
    email: mukeshpabolu@techpixe.com
  
  

paths:

#✅ admin Query form ✅

  /indhostels/auth/admin/contactus/requests:
      get:
        summary: Get paginated list of contact us requests
        description: Retrieve paginated list of contact us requests
        tags:
          - Admin-ContactUs
        security:
          - BearerAuth: []
        parameters:
          - name: page
            in: query
            description: Page number for pagination
            required: false
            schema:
              type: integer
              example: 1
          - name: limit
            in: query
            description: Number of records per page
            required: false
            schema:
              type: integer
              example: 10
        responses:
          '200':
            description: Successfully retrieved contact us requests
          '400':
            description: Bad request, missing or invalid input.
          '401':
            description: Unauthorized, user not logged in.
          '404':
            description: No requests found.
          '500':
            description: Internal Server Error.
  
  /indhostels/auth/admin/contactus/reply/{id}:
    post:
      tags:
        - Admin-ContactUs
      security:
        - BearerAuth: []
      summary: Reply to contact us message
      description: Send a reply email to a user who submitted a contact form message
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the contact message to reply to
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reply
              properties:
                reply:
                  type: string
                  description: The reply message to send to the user
                  example: Thank you for reaching out. Our team will get back to you within 24 hours with more information.
      responses:
        '200':
          description: Reply sent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  statuscode:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: Reply sent successfully
        '400':
          description: Bad request, missing or invalid input
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  statuscode:
                    type: integer
                    example: 400
                  message:
                    type: string
                    example: message id is required
                  error:
                    type: string
                    example: Not Found
        '401':
          description: Unauthorized, user not logged in.
        '404':
          description: Contact message not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  statuscode:
                    type: integer
                    example: 404
                  message:
                    type: string
                    example: message not found
                  error:
                    type: string
                    example: Not Found
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  statuscode:
                    type: integer
                    example: 500
                  message:
                    type: string
                    example: Internal Server Error
                  error:
                    type: string
                    example: Error message details
     
#✅ Admin Accommodations calls ✅

  /indhostels/auth/admin/accommodation:
    post:
      tags:
        - Admin - Accommodations
      security:
        - BearerAuth: []
      summary: Create a new accommodation
      description: Creates a new accommodation with images and details
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - property_name
                - property_description
                - property_type
                - category_name
                - city
                - area
                - address
                - amenities
                - room_types
                - cacellation_policy
                - host_contact
                - host_name
                - tax
                - tax_amount
                - isverified
                - vendorname
                - vendoremail
                - vendorphone 
                - vendorcity 
                - vendorstate 
                - vendoraddress 
                - vendorpassword
                - locationurl 
                - isbestfor 
                - nearby
              properties:
                property_name:
                  type: string
                  example: string
                property_description:
                  type: string
                  example: string
                property_type:
                  type: string
                  example: string
                category_name:
                  type: string
                  example: string
                city:
                  type: string
                  example: string
                area:
                  type: string
                  example: string
                address:
                  type: string
                  example: string
                locationurl:
                  type: string
                  example: string
                amenities:
                  type: array 
                  items: 
                    type: string
                    example: string
                room_types:
                  type: array 
                  items: 
                    type: string
                    example: lightweight
                check_in_time:
                  type: string
                  example: string
                check_out_time:
                  type: string
                  example: string
                cacellation_policy:
                  type: string
                  example: string
                host_contact:
                  type: string
                  example: string
                host_name:
                  type: string
                  example: string
                images:
                  type: array 
                  items:
                    type: file
                  description: Array of accommodation images 
                isbestfor:
                  type: string 
                  example: string 
                nearby:
                  type: array 
                  items: 
                    type: string
                    example: string 
                tax:
                   type: boolean
                   example: true
                tax_amount:
                   type: number
                   example: 10
                isverified:
                   type: boolean
                   example: true 
                vendorname: 
                  type: String 
                vendoremail: 
                  type: String 
                vendorphone:
                  type: number 
                vendorcity:
                  type: String 
                vendorstate:
                  type: String 
                vendoraddress:
                  type: String 
                vendorpassword:
                  type: String
                docs:
                  type: array 
                  items:
                    type: file
      responses:
        '200':
          description: Accommodation created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Accommodation created successfully
                  data:
                    type: object
                    description: Created accommodation object
        '400':
          description: Bad Request - Missing or invalid input
        '500':
          description: Internal Server Error
  
  /indhostels/auth/admin/accommodation/images/{id}:
    post:
      tags:
        - Admin - Accommodations
      security:
        - BearerAuth: []
      summary: Add new images to a accommodation
      description: Upload one or more images to an existing accommodation
      parameters:
        - name: id
          in: path
          required: true
          description: The product ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - images
              properties:
                images:
                  type: array
                  items:
                    type: file
                    format: binary
                  description: One or more product images
      responses:
        '200':
          description: Images added successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  statuscode:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: Images added successfully
        '400':
          description: Bad Request - Invalid ID, missing product, or empty files
        '500':
          description: Internal Server Error

  /indhostels/auth/admin/accommodation/replaceproductimage/{id}:
    patch:
      tags:
        - Admin - Accommodations 
      security:
        - BearerAuth: [] 
      summary: Replace a single image in a accommodation
      description: Replace a single image in the accommodation at a given index
      parameters:
        - name: id
          in: path
          required: true
          description: The product ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - indexes
                - images
              properties:
                indexes:
                  type: string
                  example: "[0,1]"
                  description: The index of the image to replace (send as array, e.g. "[0]" or "[0,1]")
                images:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Array of new product images
      responses:
        '200':
          description: Image replaced successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Product image replaced successfully
                  data:
                    type: object
                    description: Updated product object
        '400':
          description: Bad Request - Missing or invalid input
        '500':
          description: Internal Server Error
    
  /indhostels/auth/admin/accommodation/singleimage/{id}:
    delete:
      tags:
        - Admin - Accommodations 
      security:
        - BearerAuth: [] 
      summary: delete single image to a accommodation 
      description: delete single image to the accommodation 
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the product to which single image are to be delete
          schema:
            type: string
      requestBody:
        required: true 
        content:
          application/json:
            schema:
              type: object 
              required: 
                - index 
              properties:
                index:
                  type: integer
                  description: The index of the image to delete
      responses:
        '200':
          description: Single Image deleted successfully 
          content:
             application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Accommodation images added successfully
                  data:
                    type: object
                    description: Created accommodation object
        '400':
          description: Bad Request - Missing or invalid input
        '500':
          description: Internal Server Error
  
  /indhostels/auth/admin/allaccommodations:                 
  # get all products which are in published
    get:
      summary: Get all products with pagination
      tags:
        - Admin - Accommodations
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          description: Page number for pagination
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          description: Number of items per page
          required: false
          schema:
            type: integer
            default: 10
        - name: isverified 
          in: query
          description: Filter products by verification status
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: List of products
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  page:
                    type: integer
                    example: 1
                  limit:
                    type: integer
                    example: 10
                  totalPages:
                    type: integer
                    example: 5
                  data:
                    type: array
                    # items:
                    #   $ref: '#/components/schemas/Product'
        '404':
          description: Products not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  messsage:
                    type: string
                    example: products not found
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Internal Server Error
                  error:
                    type: string
 
  /indhostels/auth/admin/accommodation/{id}:
  # update product
    patch:
      summary: Update a Accommodation
      description: Updates Accommodation details. Only fields provided in the request body will be updated.
      tags:
        - Admin - Accommodations
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The ID of the Accommodation to update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                property_name:
                  type: string
                  example: Homely Haven
                property_description:
                  type: string
                  example: Experience comfort and community living at UrbanNest PG — fully furnished rooms, high-speed WiFi, home-cooked meals, and 24/7 security. Perfect for students and working professionals seeking convenience and style
                property_type:
                  type: string
                  example: pgs
                category_name:
                  type: string 
                  example: menspg
                city:
                  type: string
                  example: hyderabad
                area:
                  type: string 
                  example: kphb
                address:
                  type: string
                  example: KPHB Colony ,Phase2,Near Metro Station
                locationurl:
                  type: string
                  example: string
                amenities:
                  type: array
                  items:
                    type: string
                  example: 
                      - wifi
                      - Verified
                      - Free WiFi
                      - Meals included
                      - 24/7 Security
                      - Comfortable Beds
                      - Laundry Service
                      - Parking
                room_types:
                  type: array
                  items:
                    type: string
                  example: 
                      - one share
                      - two share
                      - three share
                      - four share
                      - five share
                check_in_time:
                  type: string
                  example: from 6:00 am
                check_out_time:
                  type: string
                  example: to 11:00 pm
                cancellation_policy:
                  type: string
                  example: no cancellation
                host_contact:
                  type: string
                  example: 4569873216
                host_name:
                  type: string
                  example: string
                tax:
                  type: boolean
                  example: true
                tax_amount:
                  type: number
                  example: 10
                isverified:
                  type: boolean
                  example: true
                isbestfor:
                  type: array
                  items:
                    type: string
                  example: 
                      - family
                      - friends
                      - solo traveler
                      - business traveler
                      - pet friendly
                nearby:
                  type: array
                  items:
                    type: string
                  example: 
                      - market
                      - hospital
                      - school
                      - bank
                      - gym
                      - mall
                reasonfornotverified:
                  type: string
                  example: string
                deal_of_the_day:
                  type: boolean
                  example: true
                deal_offer_percent:
                  type: number
                  example: 10
      responses:
        '200':
          description: Accommodation updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                
        '400':
          description: Invalid ID or bad request
        '404':
          description: Accommodation not found
        '500':
          description: Internal server error
    # Delete product
    delete:
      summary: Delete a Accommodation
      description: Removes a Accommodation by its ID.
      tags:
        - Admin - Accommodations
      security:
        - BearerAuth: []
      operationId: deletePost
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the Accommodation to delete.
          schema:
            type: string
      responses:
        "200":
          description: Accommodation deleted successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Accommodation deleted successfully"
        "401":
          description: ID not received.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Id not received"
        "404":
          description: Accommodation not found.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Accommodation not found"
        "500":
          description: Internal Server Error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Internal Server Error"

    get:
      summary: Retrieve a product by ID
      description: Fetches the details of a specific product using its ID.
      tags:
        - Admin - Accommodations
      security:
        - BearerAuth: []
      operationId: getById
      parameters:
        - name: id
          in: path
          required: true
          description: ID of the product to retrieve
          schema:
            type: string
      responses:
        "200":
          description: Product retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  product:
                    type: object
                    properties:
                      _id:
                        type: string
                        example: "60d21b4667d0d8992e610c85"
                      name:
                        type: string
                        example: "Cool T-Shirt"
                      description:
                        type: string
                        example: "A cool t-shirt made from organic cotton."
                      price:
                        type: number
                        format: float
                        example: 19.99
                      size:
                        type: string
                        example: "M"
                      fabric:
                        type: string
                        example: "Cotton"
                      userId:
                        type: object
                        properties:
                          firstname:
                            type: string
                            example: "John"
                          lastname:
                            type: string
                            example: "Doe"
                          email:
                            type: string
                            example: "johndoe@example.com"
        "401":
          description: ID is required
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "ID is required"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Internal Server Error"   

  /indhostels/auth/admin/accommodation/sendmail/{productname}:
    post:
      tags:
        - Admin - Accommodations
      security:
        - BearerAuth: []
      summary: Send new product mail to all users
      description: Send new product mail to all users
      parameters:
        - in: path
          name: productname
          required: true
          schema:
            type: string
          description: Name of the product to send notifications about
      responses:
        '200':
          description: Product sent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Product sent successfully"
        '400':
          description: Invalid ID or bad request
        '404':
          description: Product not found
        '500':
          description: Internal server error

