# Admin - Rooms calls 
  /indhostels/auth/admin/room/{id}:
    post:
      summary: Create a room for accommodation
      description: Create different types of rooms for a specific accommodation using accommodation ID
      tags: 
        - Admin - Rooms 
      security:
        - BearerAuth: [] 
      parameters:
        - name: id
          in: path
          required: true
          description: The accommodation ID
          schema:
            type: string 
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - room_type
                - beds_available
                - no_of_guests
                - no_of_childrens
                - room_amenities
                - room_description
                - rooms_available
                - pricings
              properties:
                room_type:
                  type: string
                  description: The type of room (single)
                  example: "Deluxe Room"
                beds_available:
                  type: number
                  description: The number of beds available in the room
                  example: 2
                no_of_guests:
                  type: number
                  description: The maximum number of guests the room can accommodate
                  example: 2
                no_of_childrens:
                  type: number
                  description: The maximum number of children the room can accommodate
                  example: 2
                room_amenities:
                  type: array
                  items:
                    type: string
                  description: Array of room amenities
                room_description:
                  type: string
                  description: Detailed description of the room
                  example: "Spacious room with a beautiful view and modern amenities"
                rooms_available:
                  type: number
                  description: The number of rooms of this type available
                  example: 5
                images:
                  type: array 
                  items:
                    type: file
                  description: Array of product images 
                pricings:
                  type: array
                  items:
                    type: object
                    properties:
                      price:
                        type: number
                        description: The price of the room
                        example: 100
                      price_type:
                        type: string
                        description: The type of price (e.g. per day, per week)
                        example: "per day"
      responses:
        '200':
          description: Room created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Room created successfully
                  data:
                    type: object
                    description: Created room object
        '400':
          description: Bad Request - Missing or invalid input
        '500':
          description: Internal Server Error
    
    put:
     summary: Update a room 
     description: Update different types of rooms for a specific accommodation using Room ID
     tags: 
        - Admin - Rooms 
     security:
        - BearerAuth: [] 
     parameters:
        - name: id
          in: path
          required: true
          description: The room ID
          schema:
            type: string
     requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                room_type:
                  type: string
                  description: The type of room (single)
                  example: "Deluxe Room"
                beds_available:
                  type: number
                  description: The number of beds available in the room
                  example: 2
                no_of_guests:
                  type: number
                  description: The maximum number of guests the room can accommodate
                  example: 2
                no_of_childrens:
                  type: number
                  description: The maximum number of children the room can accommodate
                  example: 2
                room_amenities:
                  type: array
                  items:
                    type: string
                  description: Array of room amenities
                room_description:
                  type: string
                  description: Detailed description of the room
                  example: "Spacious room with a beautiful view and modern amenities"
                rooms_available:
                  type: number
                  description: The number of rooms of this type available
                  example: 5
                # images:
                #   type: array 
                #   items:
                #     type: file
                #   description: Array of product images 
     responses:
        '200':
          description: Room created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Room created successfully
                  data:
                    type: object
                    description: Created room object
        '400':
          description: Bad Request - Missing or invalid input
        '500':
          description: Internal Server Error
    
    delete:
      summary: Delete a room
      description: Delete a room using the room id
      tags:
        - Admin - Rooms
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The room ID
          schema:
