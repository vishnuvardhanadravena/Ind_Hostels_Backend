  /indhostels/auth/user/query:
    post:
      summary: Submit a Contact Us Message
      description: Allows an authenticated user to submit a message via the contact form.
      tags:
        - contactus
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fullname:
                  type: string
                  example: "Pabolu Mukesh Narayana"
                email:
                  type: string
                  example: "mukeshpabolu123@gmail.com"
                phone:
                  type: string
                  example: "8374831031"
                subject:
                  type: string
                  example: "I have an issue with my booking."
                message:
                  type: string
                  example: "I have an issue with my booking."
      responses:
        200:
          description: Successfully submitted the contact message.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Submitted successfully"
        400:
          description: Bad request, missing or invalid input.
        401:
          description: Unauthorized, user not logged in.
        500:
          description: Internal Server Error.

