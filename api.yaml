openapi: "3.1.0"

tags:
  - name: Google_OAuth2.0 
    description: Google OAUTH2.0 
  - name: users
    description: operations related to users
  - name: accommodations
    description: operations related to accommodations
  - name: bookings
    description: operations related to bookings
  - name: payments
    description: operations related to payments  
  - name: contactus 
    description: operations related to contact us
  - name: reviews
    description: operations related to reviews

# servers:
#   - url: http://192.168.1.47:3000
#     description: Local Server
#   - url: http://localhost:3000
