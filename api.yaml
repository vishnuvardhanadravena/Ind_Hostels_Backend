      responses:
        '200':
          description: Coupon applied successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  statuscode:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: "Coupon applied successfully"
        '400':
          description: Bad Request - Invalid coupon or already used
        '401':
          description: Unauthorized - User not authenticated
