  /indhostels/auth/accommodation/{id}:
    get:
      summary: Retrieve a accommodation by ID
      description: Fetches the details of a specific accommodation  using its ID.
      tags:
        - accommodations
      security:
        - BearerAuth: []
      operationId: getById
      parameters:
        - name: id
          in: path
          required: true
          description: ID of the product to retrieve
          schema:
            type: string 
        - name: check_in_date
          in: query
          required: false
          description: Check-in date
          schema:
            type: string
        - name: check_out_date
          in: query
          required: false
          description: Check-out date
          schema:
            type: string
      responses:
        "200":
          description: accommodation retrieved successfully
        "401":
          description: ID is required
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "ID is required"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Internal Server Error"
  
  /indhostels/auth/accommodation/bycity:
    get:
      summary: get all accommodations using by city 
      description: get all accomodations using the by city and checkin and checkout date 
      tags:
       - accommodations 
      security:
        - BearerAuth: []
      parameters:
        - name: type
          in: query
          required: true
          description: type name
          schema:
            type: string 
        - name: city
          in: query
          required: true
          description: city name
          schema:
            type: string 
        - name: check_in_date
          in: query
          required: false
          description: Check-in date
          schema:
            type: string
        - name: check_out_date
          in: query
          required: false
          description: Check-out date
          schema:
            type: string 
      responses:
        "200":
          description: accommodations retrieved successfully
        "401":
          description: ID is required
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
