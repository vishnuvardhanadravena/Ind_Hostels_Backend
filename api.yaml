servers:
  - url: https://vishnu-backend.onrender.com
    description: Production Server
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    pageParam:
      name: page
      in: query
      description: Page number for pagination (starts from 1)
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    limitParam:
      name: limit
      in: query
      description: Number of items per page (max 100)
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
      
security:
  - BearerAuth: []

info:
  title: Indhostels website Api
  description: API for indhostels website
  contact:
    name: support team
    url: http://indhostels.com/contactUs
    email: mukeshpabolu@techpixe.com
  
  

paths:
  /indhostels/auth/user/google:
    get:
      summary: Redirect to Google OAuth
      description: Initiates the Google authentication process.
      tags:
        - Google_OAuth2.0
      responses:
        "302":
          description: Redirects to Google's authentication page

  /indhostels/auth/user/google/{googleId}:
    put:
      tags:
        - Google_OAuth2.0
      summary: Set a new password for a user
      description: Update the password for a user based on their ID.
      parameters:
        - name: googleId
          in: path
          required: true
          description: The ID of the user whose password is being updated.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - newpassword
              properties:
                newpassword:
                  type: string
                  example: Ajay@110125
      responses:
        '200':
          description: Password updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: password updated successfully
        '400':
          description: Missing or invalid password
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: password is required
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Internal Server Error
                  error:
                    type: object

  /indhostels/auth/user/signup:
    post:
      summary: User Signup using your details
      description: Creates a new user account. Sends a verification mail after successful signup.
      tags:
        - users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - fullname
                - email
                - phone
                - password
                - confirmpassword
                - istermsandConditions
              properties:
                fullname:
                  type: string
                  example: Mukesh Pabolu
                email:
                  type: string
                  example: mukeshpabolu123@gmail.com
                phone:
                  type: number
                  example: 8374831031
                password:
                  type: string
                  example: Mukesh@123
                confirmpassword:
                  type: string
                  example: Mukesh@123
                istermsandConditions:
                  type: boolean
                  example: true
      responses:
        '200':
          description: User created and mail send to the email
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: mail send to your email, please verify
        '401':
          description: Email already taken
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: email already taken, try another
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Internal Server Error
                  error:
                    type: string
                    example: Some error occurred

