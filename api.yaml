  /indhostels/auth/user/booking/{accoid}/{roomid}:
    post:
      tags:
        - bookings
      security:
        - BearerAuth: []
      summary: Create an booking
      description: >
         Create an booking for a specific accommodation and related room.
      parameters:
        - in: path
          name: accoid
          required: true
          schema:
            type: string
          description: accommodation ID
        - in: path
          name: roomid
          required: true
          schema:
            type: string
          description: room ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - paymentmode
              properties:
                check_in_date:
                   type: string
                   example: "2025-11-20"
                check_out_date:
                   type: string
                   example: "2025-11-25"
                price_type:
                   type: string
                   example: "fixed"
                noofguests:
                   type: integer
                   example: 2
                guestdetails:
                   type: object
                   properties:
                     fullname:
                       type: string
                       example: "John Doe"
                     mobilenumber:
                       type: number
                       example: 1234567890
                     emailAddress:
                       type: string
                       example: "john.doe@example.com"
                     agreed:
                       type: boolean
                       example: true
                     noofadults:
                       type: number
                       example: 2
                     noofchildrens: 
                       type: number
                       example: 1
                     gender:
                       type: string
                       example: "Male"
                paymentmode:
                   type: string
                   enum: [online, coc]
                   example: "online"
                bookingamount:
                   type: number
                   example: 1000
                couponCode:
                   type: string
                   example: "SAVE10"
                discountamount:
                   type: number
                   example: 100
      responses:
        '200':
          description: Order placed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Order process completed
                  razorpay_orderId:
                    type: string
                    example: "order_Izvx1234567890"
                  successfulOrders:
                    type: array
                    items:
                      type: object
                    description: List of successfully created orders
                  failedItems:
                    type: array
                    items:
                      type: object
                      properties:
                        cartId:
                          type: string
                        reason:
                          type: string
        '400':
          description: Missing or invalid inputs
        '401':
          description: Unauthorized or invalid payment/quantity
        '404':
          description: Product, cart item, or matrix not found
        '500':
          description: Internal server error
  
