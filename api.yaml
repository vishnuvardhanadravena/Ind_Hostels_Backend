  /indhostels/auth/user/booking/verify-payment:
    post:
      summary: Verify Razorpay payment and create order
      description: |
        Verifies Razorpay payment signature and creates an order in the database.
        This endpoint should be called after successful payment completion on the client side.
      tags:
        - payments
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - razorpay_order_id
                - razorpay_payment_id
                - razorpay_signature
                - orderData
              properties:
                razorpay_order_id:
                  type: string
                  description: The Razorpay order ID
                  example: order_LWzn7Wq8W5FDFt
                razorpay_payment_id:
                  type: string
                  description: The Razorpay payment ID
                  example: pay_LWznP45gy7B7El
                razorpay_signature:
                  type: string
                  description: The payment verification signature from Razorpay
                  example: 9e2e0a85a0f5e4cc8e5c254c7f7e5cb5aa15c20d59d2d86c1a...
                orderData:
                  type: object
                  required:
                    - accoid 
                    - roomid 
                    - check_in_date
                    - check_out_date 
                    - noofguests
                    - guestdetails 
                    - paymentmode 
                    - couponCode 
                    - discountamount 
                    - price_type 
                    - bookingamount
                  properties:
                    accoid:
                      type: string
                      description: accommodationid of ur stay 
                    roomid:
                      type: string
                      description: roomid of ur stay 
                    check_in_date:
                      type: string
                      description: the date of u r gng to stay
                    check_out_date:
                      type: string
                      description: the date of u r gng to leave
                    noofguests:
                      type: number
                      description: No.of People gng to come for stay
                      example: 2 
                    guestdetails:
                      type: object
                      properties:
                        fullname:
                          type: string
                          example: "John Doe"
                        mobilenumber:
                          type: number
                          example: 1234567890
                        emailAddress:
                          type: string
                          example: "john.doe@example.com"
                        agreed:
                          type: boolean
                          example: true
                        noofadults:
                          type: number
                          example: 2
                        noofchildrens:
                          type: number
                          example: 0
                        gender:
                          type: string
                          example: "male"
                    paymentmode:
                      type: string
                      enum: [online, coc]
                      default: online
                      example: online
                    discountamount:
                      type: number
                      description: Total order amount in INR
                      example: 999.99
                    couponCode:
                      type: string
                      description: Applied coupon code (if any)
                    bookingamount:
                      type: number
                      description: Total order amount in INR
                      example: 999.99 
                    price_type:
                      type: string
                      example: "per day"
      responses:
        '200':
          description: Booking created successfully after payment verification
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  statuscode:
                    type: number
                    example: 200
                  message:
                    type: string
                    example: "Booking placed successfully"
                  order:
                    $ref: '#/components/schemas/Order'
        '400':
          description: Bad Request - Invalid input or payment verification failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  statuscode:
                    type: number
                    example: 400
                  message:
                    type: string
                    example: "Payment signature verification failed"
                  error:
                    type: string
                    example: "Invalid Signature"
        '404':
          description: Not Found - User or product not found
        '500':
          description: Internal Server Error
        '400':
          description: Bad request due to invalid signature or order ID
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Payment signature verification failed
                  error:
                    type: string
                    example: Bad Request
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Internal server error
                  error:
                    type: string
                    example: Signature generation failed

